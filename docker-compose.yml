services:
  db:
    image: postgres:16-alpine
    container_name: posklinik-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: posklinik
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pos_user -d posklinik" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - posklinik-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: posklinik-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=posklinik
      - DB_USERNAME=pos_user
      - DB_PASSWORD=pos_password
      - DB_SSLMODE=prefer
      - SANCTUM_STATEFUL_DOMAINS=localhost:5174,127.0.0.1:5174,alklinik.1vcent.my.id,alklinik.1vcent.my.id:5174
      - SESSION_DOMAIN=null
    depends_on:
      db:
        condition: service_healthy
    networks:
      - posklinik-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: posklinik-frontend
    restart: unless-stopped
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://posklinik-backend:8000
    depends_on:
      - backend
    networks:
      - posklinik-network

volumes:
  db_data:

networks:
  posklinik-network:
    driver: bridge
